  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    # ✅ 1. 拉仓库
    - name: Checkout
      uses: actions/checkout@v4

    # ✅ 2. 安装依赖
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex zip curl \
          libssl-dev libelf-dev \
          clang lld unzip python3

    # ✅ 3. 拉 kernel 源码
