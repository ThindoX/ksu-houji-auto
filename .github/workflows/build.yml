name: Build KernelSU-Next Xiaomi14 (FINAL)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    # ✅ 1. Checkout
    - uses: actions/checkout@v4

    # ✅ 2. 安装依赖
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex zip curl \
          libssl-dev libelf-dev \
          clang lld llvm unzip python3

    # ✅ 3. 拉 kernel
    - name: Clone kernel
      run: |
        git clone https://github.com/mvaisakh/xiaomi14 kernel
        cd kernel
        git submodule update --init --recursive

    # ✅ 4. KernelSU-Next（官方方式）
    - name: Setup KernelSU-Next
      run: |
        cd kernel
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

    # ✅ 5. 修复 hwid 问题（必需）
    - name: Fix hwid
      run: |
        cd kernel
        sed -i '/hwid/d' drivers/misc/Kconfig || true
        mkdir -p drivers/misc/hwid
        touch drivers/misc/hwid/Kconfig

    # ✅ 6. 编译（自动识别 config，避免报错）
    - name: Build Kernel (Auto config)
      run: |
        cd kernel

        export ARCH=arm64
        export CC=clang
        export LLVM=1
        export LLVM_IAS=1

        mkdir -p out

        echo "==== STEP 1: GKI ===="
        make O=out gki_defconfig

        echo "==== STEP 2: FIND HOUJI CONFIG ===="
        CONFIG_FILE=$(find arch/arm64/configs -type f | grep -i houji | head -n 1)

        echo "Using config: $CONFIG_FILE"

        if [ -z "$CONFIG_FILE" ]; then
          echo "❌ No houji config found!"
          exit 1
        fi

        echo "==== STEP 3: MERGE CONFIG ===="
        scripts/kconfig/merge_config.sh -m -r -O out \
          out/.config \
          $CONFIG_FILE

        echo "==== STEP 4: ENABLE KSU ===="
        echo "CONFIG_KSU=y" >> out/.config

        echo "==== STEP 5: FINAL CONFIG ===="
        make O=out olddefconfig

        echo "==== STEP 6: BUILD ===="
        make -j$(nproc) O=out

        echo "==== BUILD RESULT ===="
        ls -lh out/arch/arm64/boot/

    # ✅ 7. 获取 boot.img（你必须提前上传）
    - name: Get boot.img
      run: |
        curl -L \
        https://github.com/${{ github.repository }}/releases/download/boot-stock/boot.img \
        -o boot.img

        echo "==== CHECK boot ===="
        ls -lh boot.img

    # ✅ 8. 获取 magiskboot（自动）
    - name: Prepare magiskboot
      run: |
        curl -L -o magisk.apk https://github.com/topjohnwu/Magisk/releases/latest/download/Magisk.apk
        unzip magisk.apk lib/arm64-v8a/libmagiskboot.so
        mv lib/arm64-v8a/libmagiskboot.so magiskboot
        chmod +x magiskboot

        echo "==== CHECK magiskboot ===="
        ls -lh magiskboot
        file magiskboot

    # ✅ 9. patch boot
    - name: Patch boot
      run: |
        ./magiskboot unpack boot.img

        echo "==== REPLACE KERNEL ===="
        cp kernel/out/arch/arm64/boot/Image kernel

        ./magiskboot repack boot.img boot_patched.img

    # ✅ 10. 检查输出
    - name: Verify
      run: |
        ls -lh boot_patched.img

    # ✅ 11. 上传结果
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: boot_patched
        path: boot_patched.img
