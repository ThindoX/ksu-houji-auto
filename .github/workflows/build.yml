on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    # ✅ 1. 拉仓库
    - name: Checkout
      uses: actions/checkout@v4

    # ✅ 2. 安装依赖
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex zip curl \
          libssl-dev libelf-dev \
          clang lld unzip python3

    # ✅ 3. 拉 kernel 源码
    - name: Clone kernel
      run: |
        git clone https://github.com/mvaisakh/xiaomi14 kernel
        cd kernel
        git submodule update --init --recursive

    # ✅ 4. 注入 KernelSU
    - name: Setup KernelSU
      run: |
        cd kernel
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

    # ✅ 5. 修复 hwid 报错（必须）
    - name: Fix hwid error
      run: |
        cd kernel
        sed -i '/hwid/d' drivers/misc/Kconfig || true
        mkdir -p drivers/misc/hwid
        touch drivers/misc/hwid/Kconfig



